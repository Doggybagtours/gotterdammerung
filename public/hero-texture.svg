<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <!-- Brutalist concrete blocks -->
  <rect width="1920" height="1080" fill="#0a0a0a"/>
  <rect x="0" y="680" width="1920" height="400" fill="#141414"/>
  <rect x="120" y="420" width="280" height="660" fill="#1c1c1c"/>
  <rect x="480" y="520" width="180" height="560" fill="#181818"/>
  <rect x="720" y="380" width="420" height="700" fill="#141414"/>
  <rect x="1200" y="480" width="220" height="600" fill="#1a1a1a"/>
  <rect x="1480" y="400" width="320" height="680" fill="#161616"/>
  <!-- Horizontal slab lines -->
  <line x1="0" y1="420" x2="1920" y2="420" stroke="#484848" stroke-width="1"/>
  <line x1="0" y1="680" x2="1920" y2="680" stroke="#3a3a3a" stroke-width="2"/>
  <!-- Industrial chimney -->
  <rect x="1580" y="120" width="48" height="280" fill="#222"/>
  <rect x="1568" y="100" width="72" height="24" fill="#2a2a2a"/>
  <!-- Smoke -->
  <ellipse cx="1604" cy="80" rx="60" ry="20" fill="#333" opacity="0.5"/>
  <ellipse cx="1620" cy="50" rx="40" ry="14" fill="#444" opacity="0.3"/>
  <!-- Halftone band -->
  <rect x="0" y="0" width="1920" height="200" fill="#111" opacity="0.6"/>
</svg>
